<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Suica PDF CSV</title>
    <meta
      name="description"
      content="Convert Mobile Suica PDF statements to CSV locally in the browser."
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./app.css" />
    <script src="./vendor/pdfjs/pdf.min.js"></script>
    <script type="module" src="./dist/app.js"></script>
  </head>
  <body>
    <main class="ui-shell">
      <header class="ui-masthead">
        <h1 class="ui-title">Suica PDF CSV</h1>
      </header>

      <section class="workspace" aria-label="PDF to CSV converter">
        <div class="dropzone" id="dropzone">
          <input id="fileInput" type="file" accept="application/pdf,.pdf" />
          <p id="message">PDFを選択</p>
          <button class="ui-button ui-button-primary" id="pickButton" type="button">
            選択
          </button>
        </div>
      </section>

      <section class="result-section is-empty" id="resultSection" aria-label="CSV preview">
        <div class="result-bar">
          <p id="summary"></p>
          <button class="ui-button ui-button-secondary" id="downloadButton" type="button" disabled>
            csvダウンロード
          </button>
        </div>
        <div class="table-wrap">
          <table class="ui-table">
            <thead>
              <tr>
                <th>月</th>
                <th>日</th>
                <th>種別1</th>
                <th>利用駅1</th>
                <th>種別2</th>
                <th>利用駅2</th>
                <th>残高</th>
                <th>入金・利用額</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr>
                <td colspan="8" class="empty">PDFを選択すると明細が表示されます。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
